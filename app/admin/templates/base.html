<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}kickoff-2026-api Admin{% endblock %}</title>
    <style>
        :root {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface2: #22222e;
            --border: #2e2e3e;
            --accent: #4f6ef7;
            --accent-hover: #6b85ff;
            --text: #e8e8f0;
            --text-muted: #8888a8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --live: #ff4757;
            --scheduled: #4f6ef7;
            --finished: #22c55e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); text-decoration: underline; }

        /* Sidebar */
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        .sidebar-logo {
            padding: 0 20px 24px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .sidebar-logo span { color: var(--accent); }
        .sidebar-nav { flex: 1; }
        .sidebar-nav a {
            display: block;
            padding: 10px 20px;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            color: var(--text);
            background: var(--surface2);
            text-decoration: none;
        }
        .sidebar-nav a.active { border-left: 3px solid var(--accent); padding-left: 17px; }
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }

        /* Main content */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar-title { font-size: 1.125rem; font-weight: 600; }
        .content { padding: 32px; flex: 1; overflow-y: auto; }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .card-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
        }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

        /* Tables */
        .table-wrapper { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }
        th {
            text-align: left;
            padding: 10px 14px;
            background: var(--surface2);
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        tr:hover td { background: var(--surface2); }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .badge-live { background: rgba(255,71,87,0.15); color: var(--live); border: 1px solid rgba(255,71,87,0.3); }
        .badge-scheduled { background: rgba(79,110,247,0.15); color: var(--scheduled); border: 1px solid rgba(79,110,247,0.3); }
        .badge-finished { background: rgba(34,197,94,0.15); color: var(--finished); border: 1px solid rgba(34,197,94,0.3); }
        .badge-success { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
        .badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); color: white; text-decoration: none; }
        .btn-danger { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background: var(--danger); color: white; }
        .btn-sm { padding: 5px 12px; font-size: 0.8rem; }

        /* Forms */
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
        input, select, textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }

        /* Status dot */
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .dot-green { background: var(--success); box-shadow: 0 0 6px var(--success); }
        .dot-red { background: var(--danger); }
        .dot-yellow { background: var(--warning); }

        /* Alerts */
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.875rem; }
        .alert-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }

        /* Score display */
        .score {
            font-size: 1.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
        }

        /* Utilities */
        .text-muted { color: var(--text-muted); }
        .text-sm { font-size: 0.8rem; }
        .mb-16 { margin-bottom: 16px; }
        .mb-24 { margin-bottom: 24px; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .gap-8 { gap: 8px; }
        .gap-12 { gap: 12px; }
        .justify-between { justify-content: space-between; }
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">⚽ <span>kickoff</span>-2026</div>
        <nav class="sidebar-nav">
            <a href="/admin/" {% if current_path == '/admin/' %}class="active"{% endif %}>📊 Dashboard</a>
            <a href="/admin/matches" {% if '/admin/matches' in current_path %}class="active"{% endif %}>🏟️ Matches</a>
            <a href="/admin/standings" {% if '/admin/standings' in current_path %}class="active"{% endif %}>📋 Standings</a>
            <a href="/admin/scrapers" {% if '/admin/scrapers' in current_path %}class="active"{% endif %}>🔄 Scrapers</a>
            <a href="/docs" target="_blank">📖 API Docs</a>
        </nav>
        <div class="sidebar-footer">
            <form method="post" action="/admin/logout">
                <button type="submit" class="btn btn-danger btn-sm" style="width:100%">Logout</button>
            </form>
        </div>
    </aside>
    <div class="main">
        <div class="topbar">
            <div class="topbar-title">{% block page_title %}Admin{% endblock %}</div>
            <div class="text-muted text-sm">kickoff-2026-api v0.1.0</div>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
</body>
</html>
