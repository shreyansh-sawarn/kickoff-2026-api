# fly.toml app configuration file generated for kickoff-2026-api on 2026-06-09T00:13:01+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kickoff-2026-api'
primary_region = 'lax'

[build]

[[mounts]]
  source = 'wc26_data'
  destination = '/app/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
